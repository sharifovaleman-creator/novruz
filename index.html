<html lang="az">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:description" content="Novruz bayramının tarixi, çərşənbələri və maraqlı ənənələri haqqında sayt">

</head>
<style>
/* arxa fon*/
  body {
    font-family: sans-serif;
    background-size: cover;
    background-repeat: no-repeat;
    justify-content: center;
    align-items: center;
    background-attachment: fixed;
    touch-action: none;
    height: 100vh;
    animation:arxafon 20s infinite;
  }
 @keyframes arxafon {
  0%   { background-image: url("arxafon1.jpg"); }
  12.5%{ background-image: url("arxafon2.jpg"); }
  25%  { background-image: url("arxafon3.jpg"); }
  37.5%{ background-image: url("arxafon4.jpg"); }
  50%  { background-image: url("arxafon5.jpg"); }
  62.5%{ background-image: url("arxafon6.jpg"); }
  75%  { background-image: url("arxafon7.jpg"); }
  87.5%{ background-image: url("arxafon8.jpg"); }
  100% { background-image: url("arxafon1.jpg"); }
}
/* duyme deseni*/
.buttons {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 20px;
}

.buttons a {
  text-decoration: none;
  text-align: center;
  border: 3px solid hsl(0, 0%, 100%, 0.3);
background: hsl(0, 0%, 100%, 0.2);
backdrop-filter:blur(2px);
box-shadow: inset 0 0 8px 1px hsl(0, 0%, 100% 0.3);
padding: 15px;
border-radius: 15px;
text-align: center;
color: rgba(255,255,255,0.95);

  text-shadow:
  0 1px 2px rgba(0,0,0,0.6),
  0 0 6px rgba(0,0,0,0.3);

  text-align: center;
  
}

.buttons a:hover {
  transform: translateY(-3px);
}
/* dil desteyi*/
.top-bar {
  display: flex;
  justify-content: flex-end;
  padding: 15px;
}
#langSelect {
  font-size: 16px;
  padding: 5px 10px;
  border-radius: 8px;
}
</style>
<body>
  <!-- 5 dil desteyi -->
  <div class="top-bar">
  <select id="langSelect">
    <option value="az">🇦🇿</option>
    <option value="en">🇬🇧</option>
    <option value="ru">🇷🇺</option>
    <option value="ge">🇬🇪</option>
    <option value="hy">🇦🇲</option>
  </select>
  </div>
<!--duymeler -->
  <div class="buttons" >
    <a id="tarixbtn" href="TARIX.html"> TARİX</a>
    <a id="cersembebtn" href="CERSEMBE.html">ÇƏRŞƏMBƏLƏR</a>
    <a id="sirinyatbtn" href="SIRINYAT.html">ŞİRİNYATLAR</a>
    <a id="adedbtn" href="ADED.html">ADƏT-ƏNƏNƏ</a>
    <a id="artibutbtn" href="ARTIBUT.html">ATRİBUTLAR</a>
    <a id="testbtn" href="TEST.html">SİNAQ</a>
  </div>

  <script>
  const translations = {
  az: {
    tarix: "TARİX",
    cersembe: "ÇƏRŞƏMBƏLƏR",
    sirinyat: "ŞİRİNYATLAR",
    aded: "ADƏT-ƏNƏNƏ",
    artibut: "ATRİBUTLAR",
    test: "SİNAQ"
  },
  en: {
    tarix: "HISTORY",
    cersembe: "WEDNESDAYS",
    sirinyat: "SWEETS",
    aded: "TRADITIONS",
    artibut: "ATTRIBUTES",
    test: "QUIZ"
  },
  ru: {
    tarix: "ИСТОРИЯ",
    cersembe: "СРЕДЫ",
    sirinyat: "СЛАДОСТИ",
    aded: "ТРАДИЦИИ",
    artibut: "АТРИБУТЫ",
    test: "ТЕСТ"
  },
  ge: {
    tarix: "ისტორია",
    cersembe: "ოთხშაბათები",
    sirinyat: "ტკბილეული",
    aded: "ტრადიციები",
    artibut: "ატრიბუტები",
    test: "ტესტი"
  },
  hy: {
    tarix: "ՊԱՏՄՈՒԹՅՈՒՆ",
    cersembe: "ՉՈՐԵՔՇԱԲԹԻՆԵՐ",
    sirinyat: "ՔԱՂՑՐԵՂԵՆ",
    aded: "ԱՎԱՆԴՈՒՅԹՆԵՐ",
    artibut: "ԽՈՐՀՐԴԱՆԻՇՆԵՐ",
    test: "ԹԵՍՏ"
  }
};
    const savedLang = localStorage.getItem("lang") || "az";
document.getElementById("langSelect").value = savedLang;
applyLanguage(savedLang);

document.getElementById("langSelect").addEventListener("change", function(){
  const selectedLang = this.value;
  localStorage.setItem("lang", selectedLang);
  applyLanguage(selectedLang);
});
function applyLanguage(lang) {
  if (!translations[lang]) return;
  
  document.getElementById("tarixbtn").textContent = translations[lang].tarix;
  document.getElementById("cersembebtn").textContent = translations[lang].cersembe;
  document.getElementById("sirinyatbtn").textContent = translations[lang].sirinyat;
  document.getElementById("adedbtn").textContent = translations[lang].aded;
  document.getElementById("artibutbtn").textContent = translations[lang].artibut;
  document.getElementById("testbtn").textContent = translations[lang].test;
  
  document.documentElement.lang = lang;
}
  </script>
  
</body>
</html>
