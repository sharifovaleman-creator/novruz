document.getElementById("langSelect").addEventListener("change", function(){
  const selectedLang = this.value;
  localStorage.setItem("lang", selectedLang);
  applyLanguage(selectedLang);
});
function applyLanguage(lang) {
  if (!translations[lang]) return;
  
  document.getElementById("backbtn").textContent = translations[lang].back;
  document.getElementById("test").textContent = translations[lang].test;
  document.getElementById("submit").textContent = translations[lang].submit;
  document.getElementById("result").textContent = translations[lang].result;


  
  
  document.documentElement.lang = lang;
}

let currentLang = localStorage.getItem("lang") || "az";

function renderQuiz(lang) {
  const quizEl = document.getElementById("quiz");
  quizEl.innerHTML = "";
  quizTranslations[lang].forEach((q, index) => {
    const qDiv = document.createElement("div");
    qDiv.className = "question";
    qDiv.innerHTML = `<strong>${index+1}. ${q.q}</strong>`;
    const optsDiv = document.createElement("div");
    optsDiv.className = "options";
    q.options.forEach((opt, i) => {
      optsDiv.innerHTML += `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`;
    });
    qDiv.appendChild(optsDiv);
    quizEl.appendChild(qDiv);
  });
  document.getElementById("result").innerText = "";
}

renderQuiz(currentLang);

// Submit düyməsi
document.getElementById("submit").addEventListener("click", () => {
  const questions = quizTranslations[currentLang];
  let score = 0;
  questions.forEach((q, index) => {
    const selected = document.querySelector(`input[name=q${index}]:checked`);
    if (selected && parseInt(selected.value) === q.answer) score++;
  });
 document.getElementById("result").innerText = `Sizin nəticəniz: ${score} / ${questions.length}`;
});

// Dil seçimi
document.getElementById("langSelect").value = currentLang;
document.getElementById("langSelect").addEventListener("change", function() {
  currentLang = this.value;
  localStorage.setItem("lang", currentLang);
  renderQuiz(currentLang);
});
