<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>
<style>
/* arxa fon*/
   body {
    font-family: sans-serif;
    background-size: cover;
    background-repeat: no-repeat;
    justify-content: center;
    align-items: center;
    background-attachment: fixed;
    touch-action: none;
    height: 100vh;
    animation:arxafon 20s infinite;
  }
 @keyframes arxafon {
  0%   { background-image: url("arxafon1.jpg"); }
  12.5%{ background-image: url("arxafon2.jpg"); }
  25%  { background-image: url("arxafon3.jpg"); }
  37.5%{ background-image: url("arxafon4.jpg"); }
  50%  { background-image: url("arxafon5.jpg"); }
  62.5%{ background-image: url("arxafon6.jpg"); }
  75%  { background-image: url("arxafon7.jpg"); }
  87.5%{ background-image: url("arxafon8.jpg"); }
  100% { background-image: url("arxafon1.jpg"); }
}
/* duyme deseni*/
.buttons {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 20px;
}

.buttons a {
  text-decoration: none;
  text-align: center;
  border: 3px solid hsl(0, 0%, 100%, 0.3);
  background: hsl(0, 0%, 100%, 0.2);
  backdrop-filter: blur(2px);
  box-shadow: inset 0 0 8px 1px hsl(0, 0%, 100% 0.3);
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  color: rgba(255, 255, 255, 0.95);
  
  text-shadow:
    0 1px 2px rgba(0, 0, 0, 0.6),
    0 0 6px rgba(0, 0, 0, 0.3);
  
  text-align: center;
  
}

.buttons a:hover {
  transform: translateY(-3px);
}
/* dil desteyi*/
.top-bar {
  display: flex;
  justify-content: flex-end;
  padding: 15px;
}
#langSelect {
  font-size: 16px;
  padding: 5px 10px;
  border-radius: 8px;
}
/* diblom*/
.scene {
    width: 100vw;
    height: 50vh;
    perspective: 2000px;
  }

  .album {
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.1s linear;
  }

  .photo {
    position: absolute;
    width: 200px;
    height: 280px;
    left: 50%;
    top: 50%;
    transform-style: preserve-3d;
    transform: translate(-50%, -50%) rotateY(var(--r)) translateZ(420px);
    transition: transform 0.6s;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(250,0,100,0.4);
  }

  .photo.tap {
  animation: tapAnim 0.8s ease;
}

@keyframes tapAnim {
  0%   { transform: translate(-50%, -50%) rotateY(var(--r)) translateZ(420px) scale(1); }
  50%  { transform: translate(-50%, -50%) rotateY(var(--r)) translateZ(460px) scale(1.1); }
  100% { transform: translate(-50%, -50%) rotateY(var(--r)) translateZ(420px) scale(1); }
}
.letter {
  position: fixed;
  left: 0;
  bottom: -100%;
  width: 90%;
  height: 42%;

  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(12px);
  text-shadow:
    0 1px 2px rgba(0, 0, 0, 0.6),
    0 0 6px rgba(0, 0, 0, 0.3);

  color: #fff;
  padding: 20px;
  font-size: 18px;
  line-height: 1.5;
  transition: 0.6s;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
}
.photo.dim img {
  filter: brightness(0.9);
  transition: 1s;
}

  .letter.show {
    bottom: 0;
  }
  .photo.heartbeat img {
  animation: heartBeat 0.8s infinite;
}

@keyframes heartBeat {
  0%   { transform: scale(1); }
  25%  { transform: scale(1.08); }
  40%  { transform: scale(1); }
  60%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}
.photo {
  position: absolute;
  width: 200px;
  height: 280px;
  left: 50%;
  top: 50%;
  transform-style: preserve-3d;
  transform: translate(-50%, -50%) rotateY(var(--r)) translateZ(420px);
  transition: transform 1s;
  overflow: hidden;
}

.photo video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: 5s;
  border-radius: 18px;
}

.photo.showVideo video {
  opacity: 1;
}

.text {
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  color: white;
  font-size: 22px;
  font-weight: bold;
  text-align: center;
  opacity: 1;
  transition: all 0.8s ease;
  padding: 10px 20px;
  border-radius: 10px;
  text-shadow:
    0 1px 2px rgba(0, 0, 0, 0.6),
    0 0 6px rgba(0, 0, 0, 0.3);
}

.photo:hover .text {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.6);
}
</style>
<body>
    <!-- 5 dil desteyi -->
  <div class="top-bar">
    <select id="langSelect">
      <option value="az">🇦🇿</option>
      <option value="en">🇬🇧</option>
      <option value="ru">🇷🇺</option>
      <option value="ge">🇬🇪</option>
      <option value="hy">🇦🇲</option>

  </div>
  <!-- duymeler -->
  <div class="buttons">
    <a id="backbtn" href="index.html">GERI</a>
  </div>
  <!-- cersembeler -->
<div class="scene">
  <div class="album" id="album">
    
    <div class="photo" data-i="1">
      <img src="cersembe1.jpg">
      <div class="text" id="card1" ></div>
      <video class="video" src="cersembe1.mp4" muted loop></video>

    </div>
    
    <div class="photo" data-i="2">

      <video class="video" src="cersembe2.mp4" muted loop></video>
      <h4 class="data-text" id="text2" ></h4>


    </div>
    
    <div class="photo" data-i="3">
      <img src="cersembe3.jpg">
      <div class="text" id="card3" ></div>
      <video class="video" src="cersembe3.mp4" muted loop></video>
  <h4 class="data-text" id="text3" ></h4>

      </div>
    
    <div class="photo" data-i="4">
      <img src="cersembe4.jpg">
      <div class="text" id="card4" ></div>
      <video class="video" src="cersembe4.mp4" muted loop></video>

    </div>
    
    </div>
    </div>
  
  <div class="letter" id="letter"></div>
  
</div>
  <script>
 const translations = {
  az: {
    back: "GERI",
    text1: "Su Çərşənbəsi (Əzəl Çərşənbə) İlk çərşənbə suyu müqəddəs sayır. Bu gün sular təzələnir və təmizlənir. Su həyatın mənbəyidir. Sübh tezdən su üstünə getmək, əl-üz yumaq insanı paklaşdırır.",
    text2: "Od Çərşənbəsi (Üskü Çərşənbə) od və istiliyi simvolizə edir. Qışın soyuğu qırılır. Tonqal qalanır və insanlar onun üzərindən atılaraq 'Ağırlığım-uğurluğum bu odda yansın' deyirlər.",
    text3: "Yel Çərşənbəsi havanın oyanmasını bildirir. Külək təbiəti hərəkətə gətirir. Bu gün xoş sözlər demək vacibdir, çünki küləyin onu yaydığına inanılır.",
    text4: "Torpaq Çərşənbəsi (İlaxır Çərşənbə) ən vacib gündür. Torpaq oyanır və Novruz gəlir. Ailələr yığılır, papaq atılır, fal açılır və səməni qoyulur.",
    card1: "Su Çərşənbəsi",
    card2: "Od Çərşənbəsi",
    card3: "Yel Çərşənbəsi",
    card4: "Torpaq Çərşənbəsi",
  },
  
  en: {
    back: "BACK",
    text1: "Water Tuesday is considered sacred. Waters are renewed and purified. Water is the source of life. Washing with water early in the morning cleanses the soul.",
    text2: "Fire Tuesday represents fire and warmth. The cold of winter is broken. Bonfires are lit and people jump over them saying 'let my troubles burn in this fire'.",
    text3: "Wind Tuesday symbolizes the awakening of air. Wind brings nature to life. Saying kind words is important as it is believed the wind spreads them.",
    text4: "Earth Tuesday (Last Tuesday) is the most important one. Nature awakens and Novruz arrives. Families gather, traditions like fortune-telling and growing samani are performed.",
    card1: "Water Tuesday",
    card2: "Fire Tuesday",
    card3: "Wind Tuesday",
    card4: "Earth Tuesday",
  },
  
  ru: {
    back: "НАЗАД",
    text1: "Водный вторник считается священным. Вода очищается и обновляется. Вода — источник жизни. Умывание утром очищает душу.",
    text2: "Огненный вторник символизирует тепло и огонь. Холод зимы уходит. Люди прыгают через костёр, говоря 'пусть мои беды сгорят'.",
    text3: "Ветреный вторник связан с пробуждением воздуха. Ветер оживляет природу. Считается, что он распространяет добрые слова.",
    text4: "Земляной вторник (последний) самый важный. Природа оживает, наступает Новруз. Семьи собираются и выполняют традиции.",
    card1: "Водный вторник",
    card2: "Огненный вторник",
    card3: "Ветреный вторник",
    card4: "Земляной вторник",
  },
  
  ge: {
    back: "უკან",
    text1: "წყლის სამშაბათი წმინდად ითვლება. წყალი განახლდება და იწმინდება. წყალი სიცოცხლის წყაროა. დილით წყლით დაბანა სისუფთავეს ნიშნავს.",
    text2: "ცეცხლის სამშაბათი სიმბოლურად აღნიშნავს სითბოს. ზამთრის სიცივე ქრება. ადამიანები კოცონზე ხტებიან.",
    text3: "ქარის სამშაბათი ჰაერის გაღვიძებას ნიშნავს. ქარი ბუნებას აცოცხლებს. ითვლება, რომ ის კარგ სიტყვებს ავრცელებს.",
    text4: "მიწის სამშაბათი ყველაზე მნიშვნელოვანი დღეა. ბუნება იღვიძებს და ნოვრუზი მოდის. ოჯახები იკრიბებიან და ტრადიციებს ასრულებენ.",
    card1: "წყლის სამშაბათი",
    card2: "ცეცხლის სამშაბათი",
    card3: "ქარის სამშაბათი",
    card4: "მიწის სამშაბათი",
  },
  
  hy: {
    back: "ՀԵՏ",
    text1: "Ջրի երեքշաբթին համարվում է սուրբ։ Ջուրը մաքրվում և թարմանում է։ Այն կյանքի աղբյուրն է։ Առավոտյան լվացվելը մաքրում է մարդուն։",
    text2: "Կրակի երեքշաբթին խորհրդանշում է ջերմությունը։ Ձմռան սառնությունը անցնում է։ Մարդիկ ցատկում են կրակի վրայով։",
    text3: "Քամու երեքշաբթին կապված է օդի արթնացման հետ։ Քամին կենդանացնում է բնությունը և տարածում լավ խոսքերը։",
    text4: "Հողի երեքշաբթին ամենակարևորն է։ Բնությունը արթնանում է և Նովրուզը գալիս է։ Ընտանիքները հավաքվում են և պահպանում ավանդույթները։",
    card1: "Ջրի երեքշաբթի",
    card2: "Կրակի երեքշաբթի",
    card3: "Քամու երեքշաբթի",
    card4: "Հողի երեքշաբթի",
  }
};
  
    const savedLang = localStorage.getItem("lang") || "az";
document.getElementById("langSelect").value = savedLang;
applyLanguage(savedLang);

document.getElementById("langSelect").addEventListener("change", function(){
  const selectedLang = this.value;
  localStorage.setItem("lang", selectedLang);
  applyLanguage(selectedLang);
});
function applyLanguage(lang) {
  if (!translations[lang]) return;
  
  document.getElementById("backbtn").textContent = translations[lang].back;
  document.getElementById("text1").textContent = translations[lang].text1;
  document.getElementById("text2").textContent = translations[lang].text2;
  document.getElementById("text3").textContent = translations[lang].text3;
  document.getElementById("text4").textContent = translations[lang].text4;
  document.getElementById("card1").textContent = translations[lang].card1;
  document.getElementById("card2").textContent = translations[lang].card2;
  document.getElementById("card3").textContent = translations[lang].card3;
  document.getElementById("card4").textContent = translations[lang].card4;



  
  
  document.documentElement.lang = lang;
}
  const album = document.getElementById("album");
  const photos = document.querySelectorAll(".photo");
  const letter = document.getElementById("letter");

  let rotateY = 0;
  let scale = 1;

  photos.forEach((p, i) => {
    p.style.setProperty("--r", `${i * (360 / photos.length)}deg`);
  });

  let startX = 0;

  document.addEventListener("touchstart", e => {
    if (e.touches.length === 1) {
      startX = e.touches[0].clientX;
    }
  });

  document.addEventListener("touchmove", e => {
    if (e.touches.length === 1) {
      let dx = e.touches[0].clientX - startX;
      rotateY += dx * 0.4;
      album.style.transform = `rotateY(${rotateY}deg) scale(${scale})`;
      startX = e.touches[0].clientX;
    }
  });
  let lastDist = null;

  document.addEventListener("touchmove", e => {
    if (e.touches.length === 2) {
      let dx = e.touches[0].clientX - e.touches[1].clientX;
      let dy = e.touches[0].clientY - e.touches[1].clientY;
      let dist = Math.hypot(dx, dy);

      if (lastDist) {
        scale += (dist - lastDist) * 0.002;
        scale = Math.min(Math.max(scale, 0.6), 2);
        album.style.transform = `rotateY(${rotateY}deg) scale(${scale})`;
      }
      lastDist = dist;
    }
  });
  document.addEventListener("touchend", () => lastDist = null);

let click = 0;

 photos.forEach(photo => {
  
  photo.addEventListener("touchend", () => {
    
    let now = Date.now();
    let diff =  click;
    
    if (diff < 300) {
      
      if (letter.classList.contains("show")) {
        
        letter.classList.remove("show");
        
        photos.forEach(p => {
          p.classList.remove("dim");
          p.classList.remove("showVideo");
          
          let v = p.querySelector("video");
          if (v) v.pause();
        });
        
      } else {
        
        photo.classList.add("active");
        photo.classList.add("dim");
        photo.classList.add("showVideo");
        
        let vid = photo.querySelector("video");
        if (vid) {
          vid.currentTime = 0;
          vid.play();
        }
        
        let text = photo.querySelector(".data-text").innerText;
letter.innerText = text;
        letter.classList.add("show");

        setTimeout(() => photo.classList.remove("active"), 1000);
      }
      
    }
    else {
      
      if (!letter.classList.contains("show")) {
        photo.classList.add("tap");
        setTimeout(() => photo.classList.remove("tap"), 600);
      }
      
    }
    
    lastTap = now;
  });
  
});


let holdTimer;

photos.forEach(photo => {
  
  
  photo.addEventListener("touchend", () => {
    clearTimeout(holdTimer);
    photo.classList.remove("heartbeat");
    heartSound.pause();
  });
  
});

  </script>
